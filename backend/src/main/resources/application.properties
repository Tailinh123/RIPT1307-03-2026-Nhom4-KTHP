# SERVER va APP CONFIG
spring.application.name=intern_matching
server.port=8080
apiPrefix=/api/v1


# DATABASE CONFIG
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/intern_matching}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:10032006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA va HIBERNATE
spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#  DATABASE SEEDING (TỰ ĐỘNG BƠM DỮ LIỆU)
# Đợi Hibernate tạo bảng xong mới chạy file data.sql
spring.jpa.defer-datasource-initialization=true
# Bắt buộc luôn chạy file data.sql lúc khởi động
spring.sql.init.mode= never



# FILE UPLOAD
tailinh.upload-file.base-uri=${user.dir}/uploads/
# FILE UPLOAD LIMITS
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# SECURITY CONFIG (Basic)
spring.security.user.name=tailinh
spring.security.user.password=10032006

# JWT CONFIG
tailinh.jwt.base64-secret=bXlzZWNyZXRrZXlibXlzZWNyZXRrZXlibXlzZWNyZXRrZXlibXlzZWNyZXRrZXl
tailinh.jwt.access-token-validity-in-seconds=6000
tailinh.jwt.refresh-token-validity-in-seconds=8640000

#  PAGINATION va FORMATTING
# Phân trang bắt đầu từ 1 thay vì 0
spring.data.web.pageable.one-indexed-parameters=true
# Ép định dạng LocalDate thành yyyy-MM-dd
spring.mvc.converters.preferred-json-mapper=jackson
spring.jackson.serialization.write-dates-as-timestamps=false


# hiển thị log có màu
spring.output.ansi.enabled=ALWAYS

# Skip lỗi khi Jackson serialize tạo bean (proxy) rỗng
spring.jackson.serialization.fail-on-empty-beans=false


spring.config.import=optional:classpath:application-local.properties

# ACTUATOR - chỉ expose health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

#Spring Mail

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
