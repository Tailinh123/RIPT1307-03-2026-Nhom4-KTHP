services:
  mysql-db:
    image: mysql:8.0
    container_name: intern_matching_db
    environment:
      MYSQL_DATABASE: intern_matching
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_mysql_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: intern_matching_backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql-db:3306/intern_matching?useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-your_mysql_password}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    depends_on:
      - mysql-db
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge